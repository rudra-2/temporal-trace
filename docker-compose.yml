services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: temporaltrace-sql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
      MSSQL_TCP_PORT: "${SQL_PORT:-1433}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: ./backend/TemporalTrace.Api
      dockerfile: Dockerfile
    container_name: temporaltrace-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-TemporalTraceDb};User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
    ports:
      - "${API_PORT:-5294}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/temporal-trace-ui
      dockerfile: Dockerfile
    container_name: temporaltrace-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - api

volumes:
  sql_data:
